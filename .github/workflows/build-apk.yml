name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required by Android SDK / Gradle) ──────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Install Capacitor CLI + Android platform (if not in package.json)
      - name: Install Capacitor
        run: |
          npm install --save-exact @capacitor/core @capacitor/cli @capacitor/android
          npx cap --version

      # ── 6. Build Vite web app ──────────────────────────────────────────────
      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # ── 7. Init Capacitor config if not present ────────────────────────────
      - name: Init Capacitor (if needed)
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Vonixx Frequencia" "com.vonixx.frequencia" --web-dir dist
          fi

      # ── 8. Add / sync Android platform ────────────────────────────────────
      - name: Add Android platform & sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # ── 9. Setup Android SDK ───────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 10. Grant execute permission to gradlew ────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 11. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 12. Upload APK as artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vonixx-frequencia-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Create GitHub Release (only on tag push) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: ${{ github.ref_name }}
          body: |
            ## 📱 Vonixx Frequência — ${{ github.ref_name }}
            
            ### Download
            Baixe o APK abaixo e instale no Android (habilite "Fontes desconhecidas" nas configurações).
            
            ### Changelog
            Veja os commits para detalhes das mudanças nesta versão.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
