name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag para o release (ex: v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 6. Criar .env com secrets do Firebase
      - name: Criar arquivo .env
        run: |
          cat > .env << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          EOF

      # 7. Build Vite
      - name: Build Vite
        run: npm run build

      # 8. Capacitor add Android
      - name: Capacitor add Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Pasta android/ ja existe, pulando cap add"
          fi

      # 9. Capacitor sync
      - name: Capacitor sync Android
        run: npx cap sync android

      # 9.5. Gerar icones nativos do Android (Capacitor Assets)
      - name: Gerar icones nativos
        run: npx capacitor-assets generate --android

      # 10. Atualizar versionCode e versionName
      - name: Bump Version Code
        run: |
          echo "Atualizando versionCode para: ${{ github.run_number }}"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle

      # 11. Restaurar Keystore fixa a partir do secret (ESSENCIAL para atualizar sem desinstalar)
      - name: Restaurar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vonixx-release.jks

      # 12. Configurar bloco signingConfigs no build.gradle (CORREGIDO)
      - name: Configurar signing no build.gradle
        run: |
          python3 - << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      storeFile file("vonixx-release.jks")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD || 'vonixx123' }}"
                      keyAlias "${{ secrets.KEY_ALIAS || 'vonixx' }}"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD || 'vonixx123' }}"
                  }
              }
          """

          # 1. PRIMERO: Añadimos la llamada al signingConfig dentro del buildTypes.
          # Se hace antes para que el replace afecte al 'release' original, no al nuevo que creamos arriba.
          if "signingConfig signingConfigs.release" not in content:
              content = content.replace(
                  "release {",
                  "release {\n            signingConfig signingConfigs.release",
                  1
              )

          # 2. SEGUNDO: Insertamos la definición del Keystore justo antes de buildTypes
          if "signingConfigs {" not in content:
              content = content.replace("    buildTypes {", signing_config + "\n    buildTypes {", 1)

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("build.gradle atualizado com sucesso.")
          PYEOF

      # 13. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 14. Permissoes Gradle
      - name: Permissoes Gradle
        run: chmod +x android/gradlew

      # 15. Compilar APK release (assinado com keystore fixa)
      - name: Compilar APK (release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 16. Renomear APK
      - name: Renomear APK
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M')
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/vonixx-frequencia-${TIMESTAMP}.apk
          echo "APK_NAME=vonixx-frequencia-${TIMESTAMP}.apk" >> $GITHUB_ENV
          echo "APK_PATH=android/app/build/outputs/apk/release/vonixx-frequencia-${TIMESTAMP}.apk" >> $GITHUB_ENV

      # 17. Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # 18. GitHub Release
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: ${{ env.APK_PATH }}
          name: "Vonixx Frequencia ${{ github.event.inputs.release_tag || github.ref_name }}"
          body: |
            ## Vonixx Frequencia - Build #${{ github.run_number }}
            Esta versão permite atualização direta sobre a anterior.

            ### Como instalar
            1. Baixe o APK abaixo.
            2. Abra e clique em **Atualizar** (sem precisar desinstalar).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
