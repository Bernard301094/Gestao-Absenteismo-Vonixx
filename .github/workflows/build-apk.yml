name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 21 (capacitor-android requires sourceCompatibility = 21) ─
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Install Capacitor CLI + Android platform ────────────────────────
      - name: Install Capacitor
        run: |
          npm install --save-exact @capacitor/core @capacitor/cli @capacitor/android
          npx cap --version

      # ── 6. Build Vite web app ──────────────────────────────────────────────
      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # ── 7. Init Capacitor config if not present ────────────────────────────
      - name: Init Capacitor (if needed)
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Vonixx Frequencia" "com.vonixx.frequencia" --web-dir dist
          fi

      # ── 8. Add / sync Android platform ────────────────────────────────────
      - name: Add Android platform & sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # ── 9. Fix Kotlin stdlib duplicate classes ─────────────────────────────
      # kotlin-stdlib >= 1.8 already bundles jdk7/jdk8 classes.
      # Capacitor still pulls in the old split artifacts (1.6.x), causing
      # duplicate class errors. We patch build.gradle to force-align all
      # kotlin-stdlib-jdk* variants to the same version as kotlin-stdlib.
      - name: Patch Kotlin stdlib conflict in android/build.gradle
        run: |
          GRADLE_FILE="android/build.gradle"

          # Check if the resolution block already exists (idempotent)
          if grep -q "kotlin-stdlib-jdk" "$GRADLE_FILE"; then
            echo "Kotlin resolution already present, skipping."
            exit 0
          fi

          # Detect the kotlin_version already declared in build.gradle
          KOTLIN_VERSION=$(grep -oP "(?<=kotlin_version = ')[^']+" "$GRADLE_FILE" || echo "1.9.10")
          echo "Detected kotlin_version: $KOTLIN_VERSION"

          # Append a subprojects resolution block at the end of the file
          cat >> "$GRADLE_FILE" << EOF

          // ── Fix: force-align kotlin-stdlib-jdk7/jdk8 to kotlin-stdlib version ──
          // Kotlin >= 1.8 ships jdk7/jdk8 classes inside kotlin-stdlib itself.
          // Without this, Capacitor's transitive deps pull in the old split JARs
          // and the build fails with "Duplicate class" errors.
          subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          if (details.requested.name in ['kotlin-stdlib-jdk7', 'kotlin-stdlib-jdk8']) {
                              details.useVersion '$KOTLIN_VERSION'
                              details.because 'Align jdk7/jdk8 split JARs with unified kotlin-stdlib version'
                          }
                      }
                  }
              }
          }
          EOF

          echo "Patched $GRADLE_FILE successfully."
          echo "--- Tail of patched file ---"
          tail -30 "$GRADLE_FILE"

      # ── 10. Setup Android SDK ──────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 11. Grant execute permission to gradlew ────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 12. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 13. Upload APK as artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vonixx-frequencia-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 14. Create GitHub Release (only on tag push) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: ${{ github.ref_name }}
          body: |
            ## 📱 Vonixx Frequência — ${{ github.ref_name }}

            ### Download
            Baixe o APK abaixo e instale no Android (habilite "Fontes desconhecidas" nas configurações).

            ### Changelog
            Veja os commits para detalhes das mudanças nesta versão.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
