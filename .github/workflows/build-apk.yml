name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag para o release (ex: v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Java 17 (requerido por Gradle / Android SDK)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instalar dependencias Node (incluye @capacitor/cli, core, android)
      - name: Instalar dependencias
        run: npm install

      # 6. Crear .env con secrets de Firebase
      - name: Criar arquivo .env
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          EOF

      # 7. Build Vite (genera dist/)
      - name: Build Vite
        run: npm run build

      # 8. Agregar plataforma Android (crea carpeta android/ si no existe)
      - name: Capacitor add Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Carpeta android/ ya existe, omitiendo cap add"
          fi

      # 9. Capacitor sync (copia dist/ a android/app/src/main/assets/public)
      - name: Capacitor sync Android
        run: npx cap sync android

      # 10. Dar permisos de ejecución a gradlew
      - name: Permissões Gradle
        run: chmod +x android/gradlew

      # 11. Compilar APK debug
      - name: Compilar APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 12. Renombrar APK con timestamp
      - name: Renomear APK
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M')
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/vonixx-frequencia-${TIMESTAMP}.apk
          echo "APK_NAME=vonixx-frequencia-${TIMESTAMP}.apk" >> $GITHUB_ENV

      # 13. Subir APK como artifact (disponible 30 días)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
          retention-days: 30

      # 14. Crear Release en GitHub (solo si es un tag v*)
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Vonixx Frequência ${{ github.ref_name }}

            ### Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No Android, vá em **Configurações → Segurança → Fontes desconhecidas** e habilite
            3. Abra o arquivo `.apk` para instalar

            > Build gerado automaticamente pelo GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
